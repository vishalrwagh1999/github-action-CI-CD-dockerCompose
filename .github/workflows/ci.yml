name: TWS CI Workflow

on:
    push:

jobs:
    build-and-push:  # job ka naam
        runs-on: ubuntu-latest # GitHub Runner (Free)
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4 # clone the code into a ubuntu runner

            - name: Setup Docker
              uses: docker/setup-buildx-action@v4

            - uses: docker/login-action@v4 # to authenticate
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:shyam